version: '3.8'

services:
  arbitrum-agent-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - agent-data:/root/.arb-agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  agent-data:
